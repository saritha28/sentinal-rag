on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  python-quality:
    name: Python lint + typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install 3.12
      - name: Install workspace (all members in editable mode)
        run: uv sync --all-packages --all-extras
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Pyright
        run: uv run pyright

  python-tests:
    name: Python unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install 3.12
      - name: Install workspace (all members in editable mode)
        run: uv sync --all-packages --all-extras
      - name: Run unit tests
        run: uv run pytest -m unit --cov --cov-report=xml
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  frontend-quality:
    name: Frontend lint + typecheck + tests + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Biome lint
        run: npm run lint
      - name: TypeScript typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm run test -- --run
      - name: Production build
        run: npm run build
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: E2E regression tests
        run: npm run test:e2e

  python-integration:
    name: Python integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      docker:
        image: docker:dind
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Install workspace (all members in editable mode)
        run: uv sync --all-packages --all-extras
      - name: Run integration tests
        run: uv run pytest -m integration

  helm-lint:
    name: Helm chart lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Helm lint
        shell: bash
        run: |
          if [ -f infra/helm/sentinelrag/Chart.yaml ]; then
            helm lint infra/helm/sentinelrag
          else
            echo "Helm chart not present, skipping."
          fi

  terraform-fmt:
    name: Terraform fmt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt
        shell: bash
        run: |
          if [ -d infra/terraform ] && find infra/terraform -type f -name '*.tf' | grep -q .; then
            terraform fmt -check -recursive infra/terraform
          else
            echo "Terraform files not present, skipping."
          fi

  detect-secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
