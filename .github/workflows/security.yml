name: security

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Catch new CVEs even when nothing changed.
    - cron: "23 4 * * 1"  # Mondays 04:23 UTC
  workflow_dispatch:

# Each job uploads SARIF to the GitHub code-scanning UI so findings are
# tracked over time and surface in PR review.
permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tfsec:
    name: tfsec (Terraform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: tfsec
        uses: aquasecurity/tfsec-sarif-action@v0.1.4
        with:
          working_directory: infra/terraform
          sarif_file: tfsec.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: tfsec.sarif
          category: tfsec

  bandit:
    name: bandit (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install "bandit[sarif]==1.7.10" "toml>=0.10.2" "toml>=0.10.2" "toml>=0.10.2"

      - name: Run bandit
        run: |
          bandit \
            -r apps packages \
             \
            --severity-level medium \
            -x "**/tests/**,**/__pycache__/**" \
            -f sarif \
            -o bandit.sarif || true
        # `|| true` because bandit exits non-zero on findings; we surface
        # them via SARIF and let the security tab gate.

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: bandit.sarif
          category: bandit

  trivy-fs:
    name: trivy (filesystem + IaC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          # Don't scan the helm dependency tarballs / extracted dirs;
          # those upstream charts have their own CVE pipelines and any
          # finding here is noise.
          skip-dirs: "infra/helm/sentinelrag/charts"

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  trivy-images:
    name: trivy (Docker images)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - { name: "api",             dockerfile: "apps/api/Dockerfile",             context: "." }
          - { name: "temporal-worker", dockerfile: "apps/temporal-worker/Dockerfile", context: "." }
          - { name: "frontend",        dockerfile: "apps/frontend/Dockerfile",        context: "apps/frontend" }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: false
          load: true
          tags: sentinelrag-${{ matrix.image.name }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan — ${{ matrix.image.name }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: sentinelrag-${{ matrix.image.name }}:scan
          format: sarif
          output: trivy-${{ matrix.image.name }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload SARIF — ${{ matrix.image.name }}
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-${{ matrix.image.name }}.sarif
          category: trivy-image-${{ matrix.image.name }}
