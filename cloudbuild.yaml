substitutions:
  _REGISTRY: us-central1-docker.pkg.dev
  _PROJECT: sentinelrag
  _REPO: sentinelrag

steps:
  - name: gcr.io/cloud-builders/docker
    id: build-api
    args:
      - build
      - -t
      - ${_REGISTRY}/${_PROJECT}/${_REPO}/api:$SHORT_SHA
      - -t
      - ${_REGISTRY}/${_PROJECT}/${_REPO}/api:latest
      - -f
      - apps/api/Dockerfile
      - .

  - name: gcr.io/cloud-builders/docker
    id: build-temporal-worker
    args:
      - build
      - -t
      - ${_REGISTRY}/${_PROJECT}/${_REPO}/temporal-worker:$SHORT_SHA
      - -t
      - ${_REGISTRY}/${_PROJECT}/${_REPO}/temporal-worker:latest
      - -f
      - apps/temporal-worker/Dockerfile
      - .

  - name: gcr.io/cloud-builders/docker
    id: build-frontend
    args:
      - build
      - -t
      - ${_REGISTRY}/${_PROJECT}/${_REPO}/frontend:$SHORT_SHA
      - -t
      - ${_REGISTRY}/${_PROJECT}/${_REPO}/frontend:latest
      - -f
      - apps/frontend/Dockerfile
      - apps/frontend

  - name: gcr.io/cloud-builders/docker
    id: push-api
    args: [push, --all-tags, ${_REGISTRY}/${_PROJECT}/${_REPO}/api]
    waitFor: [build-api]

  - name: gcr.io/cloud-builders/docker
    id: push-temporal-worker
    args: [push, --all-tags, ${_REGISTRY}/${_PROJECT}/${_REPO}/temporal-worker]
    waitFor: [build-temporal-worker]

  - name: gcr.io/cloud-builders/docker
    id: push-frontend
    args: [push, --all-tags, ${_REGISTRY}/${_PROJECT}/${_REPO}/frontend]
    waitFor: [build-frontend]

images:
  - ${_REGISTRY}/${_PROJECT}/${_REPO}/api:$SHORT_SHA
  - ${_REGISTRY}/${_PROJECT}/${_REPO}/temporal-worker:$SHORT_SHA
  - ${_REGISTRY}/${_PROJECT}/${_REPO}/frontend:$SHORT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
