steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/api:$SHORT_SHA', './apps/api']
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/frontend:$SHORT_SHA', './apps/frontend']
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/retrieval-service:$SHORT_SHA', './apps/retrieval-service']
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/evaluation-service:$SHORT_SHA', './apps/evaluation-service']
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/temporal-worker:$SHORT_SHA', './apps/temporal-worker']
images:
- 'gcr.io/$PROJECT_ID/api:$SHORT_SHA'
- 'gcr.io/$PROJECT_ID/frontend:$SHORT_SHA'
- 'gcr.io/$PROJECT_ID/retrieval-service:$SHORT_SHA'
- 'gcr.io/$PROJECT_ID/evaluation-service:$SHORT_SHA'
- 'gcr.io/$PROJECT_ID/temporal-worker:$SHORT_SHA'
