# Alembic configuration for SentinelRAG.
#
# All migrations are HAND-WRITTEN. Autogenerate is disabled by convention
# (see CLAUDE.md "common footguns"). Use:
#     make db-revision msg="add users table"
# to create a new empty revision; fill it in by hand.

[alembic]
script_location = .
sqlalchemy.url = driver://user:pass@localhost/dbname  ; overridden by env.py
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
output_encoding = utf-8
prepend_sys_path = .
timezone = UTC

[post_write_hooks]
hooks = ruff
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
