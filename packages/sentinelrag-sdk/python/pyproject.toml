[project]
name = "sentinelrag-sdk"
version = "0.1.0"
description = "SentinelRAG Python SDK — programmatic client for the platform."
requires-python = ">=3.12,<3.13"
license = { text = "MIT" }

dependencies = [
    "httpx>=0.27",
    "pydantic>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["sentinelrag"]
