global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: sentinelrag-local
    environment: local

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          source: otel

  # Add app-service scrape targets here once they expose /metrics.
  # The OTel collector exports app metrics on :8889 via the prometheus exporter,
  # so app-service direct scraping isn't strictly required.
